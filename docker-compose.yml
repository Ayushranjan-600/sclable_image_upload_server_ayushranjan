version: '3.8'

services:
  app1:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-mock_bucket}
    networks:
      - upload-net

  app2:
    build: .
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-mock_bucket}
    networks:
      - upload-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - upload-net

networks:
  upload-net:
    driver: bridge
